services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gluetun
    networks:
      - arrnet
    restart: unless-stopped

  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      TZ: Europe/Bucharest
      FIREWALL_OUTBOUND_SUBNETS: 192.168.2.0/24

      VPN_SERVICE_PROVIDER: protonvpn
      VPN_TYPE: wireguard

      WIREGUARD_PRIVATE_KEY: ${WIREGUARD_PRIVATE_KEY}
      WIREGUARD_ADDRESSES: ${WIREGUARD_ADDRESSES}

      SERVER_COUNTRIES: Romania
      SERVER_CITIES: Bucharest
    env_file:
      - .env
    ports:
      - "9696:9696" # Prowlarr
      - "9117:9117" # Jackett

      - "8989:8989" # Sonarr
      - "7878:7878" # Radarr

      - "6767:6767" # Bazarr
      - "7889:7889" # trailarr

      - "8080:8080" # qBittorrent web interface
      - "6881:6881" # qBittorrent torrent port
      - "8085:8085" # SABnzbd
      - "6789:6789" # nzbget
    volumes:
      - gluetun_volume:/gluetun
    networks:
      - arrnet
    healthcheck:
      test: ping -c 1 www.google.com || exit 1
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    network_mode: "service:gluetun"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Bucharest
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - prowlarr_volume:/config
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    restart: unless-stopped

  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett
    network_mode: "service:gluetun"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Bucharest
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - jackett_volume:/config
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    restart: unless-stopped

  ##################

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    network_mode: "service:gluetun"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Bucharest
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - sonarr_volume:/config
      - /data/media:/data
      - /data/downloads/qbittorrent:/downloads
      - /data/downloads/sabnzbd:/config/Downloads
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    network_mode: "service:gluetun"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Bucharest
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - radarr_volume:/config
      - /data/media:/data
      - /data/downloads/qbittorrent:/downloads
      - /data/downloads/sabnzbd:/config/Downloads
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    restart: unless-stopped

  ##################

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    network_mode: "service:gluetun"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Bucharest
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - bazarr_volume:/config
      - /data/media:/data
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    restart: unless-stopped

  trailarr:
    image: nandyalu/trailarr
    container_name: trailarr
    network_mode: "service:gluetun"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Bucharest
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - trailarr_volume:/config
      - /data/media:/data
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    restart: unless-stopped

  ##################

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Bucharest
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
    volumes:
      - qbittorrent_volume:/config
      - /data/downloads/qbittorrent:/downloads
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    restart: unless-stopped
    labels:
      - deunhealth.restart.on.unhealthy=true
    healthcheck:
      test: ping -c 1 www.google.com || exit 1
      interval: 60s
      retries: 3
      start_period: 20s
      timeout: 10s

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    network_mode: "service:gluetun"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Bucharest
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - sabnzbd_volume:/config
      - /data/downloads/sabnzbd:/config/Downloads
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    restart: unless-stopped

  nzbget:
    image: lscr.io/linuxserver/nzbget:latest
    container_name: nzbget
    network_mode: "service:gluetun"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Bucharest
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - nzbget_volume:/config
      - /data/downloads/nzbget:/downloads
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    restart: unless-stopped

  deunhealth:
    image: qmcgaw/deunhealth
    container_name: deunhealth
    network_mode: "none"
    environment:
      - LOG_LEVEL=info
      - HEALTH_SERVER_ADDRESS=127.0.0.1:9999
      - TZ=Europe/Bucharest
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

networks:
  arrnet:
    driver: bridge

volumes:
  gluetun_volume:
  prowlarr_volume:
  jackett_volume:
  sonarr_volume:
  radarr_volume:
  bazarr_volume:
  trailarr_volume:
  qbittorrent_volume:
  sabnzbd_volume:
  nzbget_volume:
